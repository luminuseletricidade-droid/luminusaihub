# Backend Service Configuration
[phases.setup]
nixPkgs = ["python39", "python39Packages.pip", "poppler_utils"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["echo '=== Build phase completed ==='"]

[start]
cmd = "python3 migrate.py migrate && uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
